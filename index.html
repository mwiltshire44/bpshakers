<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Salt & Pepper Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-eyebrow">A Family Collection</span>
        <h1 class="site-title">The Salt &amp; Pepper Shakers</h1>
        <span class="header-subtitle">Gathered with love, shared with joy</span>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Gallery</a>
        <a href="#" class="nav-link" id="admin-nav-link">Admin</a>
      </nav>
    </div>
  </header>

  <main class="main-content">

    <!-- Search & Sort Bar -->
    <div class="controls-bar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search by name, year, origin, description…" autocomplete="off" />
        <button class="search-clear" id="search-clear" aria-label="Clear search" style="display:none">✕</button>
      </div>
      <div class="sort-wrap">
        <label class="sort-label" for="sort-select">Sort by</label>
        <select id="sort-select" class="sort-select">
          <option value="recently-added">Recently added</option>
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="az">Name A → Z</option>
          <option value="za">Name Z → A</option>
          <option value="country-az">By Country A → Z</option>
          <option value="country-za">By Country Z → A</option>
        </select>
      </div>
    </div>

    <!-- Category Filter Bar (shown once categories load) -->
    <div class="category-filter-bar" id="category-filter-bar" style="display:none">
      <span class="cat-filter-label">Category</span>
      <div class="cat-filter-pills-scroll">
        <div class="cat-filter-pills" id="cat-filter-pills">
          <button class="cat-filter-btn active" data-cat="" onclick="selectCategory(this, '')">All</button>
        </div>
      </div>
    </div>

    <!-- Results count -->
    <div class="results-info" id="results-info"></div>

    <!-- Loading spinner (outside grid so grid.innerHTML doesn't destroy it) -->
    <div class="gallery-loading" id="gallery-loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p>Loading the collection…</p>
    </div>

    <!-- Flat gallery grid (default) -->
    <div class="gallery-grid" id="gallery-grid"></div>

    <!-- Country-grouped view (country sorts only) -->
    <div id="country-groups" style="display:none"></div>

    <div class="gallery-empty" id="gallery-empty" style="display:none">
      <p id="empty-message">No shakers found.</p>
      <button class="btn-soft" onclick="clearFilters()">Clear filters</button>
    </div>

  </main>

  <footer class="site-footer">
    <p>A collection of treasures, lovingly catalogued &mdash; <span id="footer-year"></span></p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { firebaseConfig } from "./js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById("footer-year").textContent = new Date().getFullYear();

    onAuthStateChanged(auth, (user) => {
      const link = document.getElementById("admin-nav-link");
      if (user) {
        link.href = "admin/index.html";
        link.textContent = "Admin Panel";
      } else {
        link.href = "admin/login.html";
        link.textContent = "Admin";
      }
    });

    let allSets = [];
    let allCategories = [];
    let activeCategory = ""; // "" = All

    // Load categories and sets in parallel
    async function init() {
      try {
        const [setsSnap, catsSnap] = await Promise.all([
          getDocs(query(collection(db, "sets"), orderBy("createdAt", "desc"))),
          getDocs(query(collection(db, "categories"), orderBy("name")))
        ]);

        allSets = setsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        allCategories = catsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        buildCategoryBar();
        filterAndSort();
      } catch (e) {
        console.error("Error loading data:", e);
        document.getElementById("gallery-loading").innerHTML =
          '<p style="color:var(--clay)">Could not load the collection. Check your Firebase config.</p>';
      }
    }

    function buildCategoryBar() {
      if (allCategories.length === 0) return;

      const bar = document.getElementById("category-filter-bar");
      const pills = document.getElementById("cat-filter-pills");

      bar.style.display = "flex";
      allCategories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-filter-btn";
        btn.dataset.cat = cat.id;
        btn.textContent = cat.name;
        btn.onclick = () => selectCategory(btn, cat.id);
        pills.appendChild(btn);
      });
    }

    window.selectCategory = function(btn, catId) {
      activeCategory = String(catId); // ensure string comparison
      document.querySelectorAll(".cat-filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterAndSort();
    };

    function esc(str) {
      if (!str) return "";
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Country color map ──────────────────────────────────────────────────
    // Each entry: [borderColor, bgColor, textColor]
    const COUNTRY_COLORS = {
      "Canada":         ["#c41e3a", "#f9f4ec", "#8b0000"],
      "USA":            ["#3c3b6e", "#f9f4ec", "#1a1940"],
      "United States":  ["#3c3b6e", "#f9f4ec", "#1a1940"],
      "Unknown":        ["#b85c38", "#f9f4ec", "#7a3e28"],
      "Japan":          ["#bc002d", "#f9f4ec", "#7a0020"],
      "Germany":        ["#2b2b2b", "#f9f4ec", "#1a1a1a"],
      "France":         ["#0055a4", "#f9f4ec", "#003380"],
      "Italy":          ["#009246", "#f9f4ec", "#006630"],
      "Spain":          ["#c60b1e", "#f9f4ec", "#8a0015"],
      "Mexico":         ["#006847", "#f9f4ec", "#004d35"],
      "United Kingdom": ["#012169", "#f9f4ec", "#010f40"],
      "Ireland":        ["#169b62", "#f9f4ec", "#0d6b44"],
      "Portugal":       ["#006600", "#f9f4ec", "#004400"],
      "Netherlands":    ["#ae1c28", "#f9f4ec", "#7a1220"],
      "Belgium":        ["#2d2926", "#f9f4ec", "#1a1917"],
      "Sweden":         ["#006aa7", "#f9f4ec", "#004d80"],
      "Norway":         ["#ef2b2d", "#f9f4ec", "#a81f20"],
      "Denmark":        ["#c60c30", "#f9f4ec", "#8a0922"],
      "Finland":        ["#003580", "#f9f4ec", "#002060"],
      "Switzerland":    ["#ff0000", "#f9f4ec", "#cc0000"],
      "Austria":        ["#ed2939", "#f9f4ec", "#b01d2a"],
      "Poland":         ["#dc143c", "#f9f4ec", "#9a0e2a"],
      "Czech Republic": ["#d7141a", "#f9f4ec", "#960e12"],
      "Hungary":        ["#477050", "#f9f4ec", "#2d4d33"],
      "Romania":        ["#002b7f", "#f9f4ec", "#001a4d"],
      "Greece":         ["#0d5eaf", "#f9f4ec", "#083d80"],
      "China":          ["#de2910", "#f9f4ec", "#9e1c0b"],
      "India":          ["#ff9933", "#f9f4ec", "#cc7a00"],
      "Australia":      ["#00008b", "#f9f4ec", "#000066"],
      "New Zealand":    ["#00247d", "#f9f4ec", "#001a5e"],
      "Brazil":         ["#009c3b", "#f9f4ec", "#006d29"],
      "Argentina":      ["#74acdf", "#f9f4ec", "#3d7eb8"],
      "Peru":           ["#d91023", "#f9f4ec", "#9a0b19"],
      "Colombia":       ["#fcd116", "#f9f4ec", "#b09000"],
      "South Africa":   ["#007a4d", "#f9f4ec", "#005535"],
      "Kenya":          ["#006600", "#f9f4ec", "#004400"],
      "Nigeria":        ["#008751", "#f9f4ec", "#005c37"],
      "Egypt":          ["#c09300", "#f9f4ec", "#8a6a00"],
      "Morocco":        ["#c1272d", "#f9f4ec", "#891d21"],
      "Taiwan":         ["#fe0000", "#f9f4ec", "#cc0000"],
      "South Korea":    ["#003478", "#f9f4ec", "#002050"],
      "Thailand":       ["#a51931", "#f9f4ec", "#731222"],
      "Vietnam":        ["#da251d", "#f9f4ec", "#9a1a14"],
      "Philippines":    ["#0038a8", "#f9f4ec", "#002880"],
      "Indonesia":      ["#ce1126", "#f9f4ec", "#920c1b"],
      "Malaysia":       ["#cc0001", "#f9f4ec", "#8a0001"],
      "Singapore":      ["#ef3340", "#f9f4ec", "#b0232e"],
      "Russia":         ["#003580", "#f9f4ec", "#002060"],
      "Ukraine":        ["#005bbb", "#f9f4ec", "#003d80"],
      "Turkey":         ["#e30a17", "#f9f4ec", "#a00711"],
      "Israel":         ["#0038b8", "#f9f4ec", "#002880"],
      "Saudi Arabia":   ["#006c35", "#f9f4ec", "#004a24"],
      "Cuba":           ["#002a8f", "#f9f4ec", "#001a60"],
      "Jamaica":        ["#2d7a2d", "#f9f4ec", "#1a5a1a"],
    };

    const DEFAULT_COLORS = ["#7a4f2e", "#f7f0e8", "#4a2e10"]; // warm wood fallback

    function getCountryColors(country) {
      if (!country || country.trim() === "") return COUNTRY_COLORS["Unknown"] || DEFAULT_COLORS;
      return COUNTRY_COLORS[country] || DEFAULT_COLORS;
    }



    function renderCardHTML(set, i) {
      return `
        <a href="set.html?id=${esc(set.id)}" class="gallery-card" style="animation-delay:${i * 40}ms">
          <div class="card-image-wrap">
            <img
              src="${esc(set.imageUrl || "")}"
              alt="${esc(set.name)}"
              class="card-image"
              loading="lazy"
              onerror="this.src='img/placeholder.svg'"
            />
            <div class="card-overlay">
              <span class="card-name">${esc(set.name)}</span>
              <span class="card-country">${set.setNo != null ? `#${set.setNo}` : ""}${set.setNo != null && set.country ? " · " : ""}${esc(set.country || "")}</span>
            </div>
          </div>
        </a>`;
    }

    function renderGallery(sets) {
      const grid        = document.getElementById("gallery-grid");
      const groups      = document.getElementById("country-groups");
      const loading     = document.getElementById("gallery-loading");
      const empty       = document.getElementById("gallery-empty");
      const info        = document.getElementById("results-info");
      const sort        = document.getElementById("sort-select").value;
      const isCountry   = sort === "country-az" || sort === "country-za";

      if (loading) loading.style.display = "none";

      if (sets.length === 0) {
        grid.innerHTML = "";
        groups.innerHTML = "";
        grid.style.display = "";
        groups.style.display = "none";
        empty.style.display = "block";
        const q = document.getElementById("search-input").value.trim();
        const catName = activeCategory
          ? (allCategories.find(c => c.id === activeCategory)?.name || "")
          : "";
        let msg = "No shakers found";
        if (q && catName) msg += ` matching "${q}" in ${catName}`;
        else if (q) msg += ` matching "${q}"`;
        else if (catName) msg += ` in ${catName}`;
        document.getElementById("empty-message").textContent = msg + ".";
        info.textContent = "";
        return;
      }

      empty.style.display = "none";

      const q = document.getElementById("search-input").value.trim();
      const catName = activeCategory
        ? (allCategories.find(c => c.id === activeCategory)?.name || "")
        : "";
      let infoText = `${sets.length} set${sets.length !== 1 ? "s" : ""}`;
      if (catName) infoText += ` in ${catName}`;
      if (q) infoText += ` matching "${q}"`;
      info.textContent = infoText;

      if (isCountry) {
        // ── Grouped view ───────────────────────────────────────────────────
        grid.style.display = "none";
        grid.innerHTML = "";
        groups.style.display = "block";

        // Countries that get province sub-grouping
        const PROVINCE_COUNTRIES = ["Canada", "USA"];

        // Group sets by country
        const grouped = {};
        sets.forEach(set => {
          const key = set.country && set.country.trim() ? set.country.trim() : "__unknown__";
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(set);
        });

        // Sort country keys
        let keys = Object.keys(grouped).filter(k => k !== "__unknown__");
        keys.sort((a, b) => sort === "country-za" ? b.localeCompare(a) : a.localeCompare(b));
        if (grouped["__unknown__"]) keys.push("__unknown__");

        groups.innerHTML = keys.map((key, gi) => {
          const countryName = key === "__unknown__" ? "Unknown" : key;
          const [border, bg, text] = getCountryColors(countryName);
          const groupSets = grouped[key];
          const useProvinces = PROVINCE_COUNTRIES.includes(countryName);

          let innerHtml = "";
          if (useProvinces) {
            // Sub-group by province
            const byProvince = {};
            const noProvince = [];
            groupSets.forEach(set => {
              const prov = set.province && set.province.trim() ? set.province.trim() : null;
              if (prov) {
                if (!byProvince[prov]) byProvince[prov] = [];
                byProvince[prov].push(set);
              } else {
                noProvince.push(set);
              }
            });

            // Sort province keys
            let provKeys = Object.keys(byProvince);
            provKeys.sort((a, b) => sort === "country-za" ? b.localeCompare(a) : a.localeCompare(b));

            // Province boxes
            innerHtml += provKeys.map((prov, pi) => {
              const provSets = byProvince[prov];
              const provCards = provSets.map((set, i) => renderCardHTML(set, gi * 50 + pi * 20 + i)).join("");
              return `
                <div class="province-group">
                  <div class="province-group-label">
                    <span class="province-name">${esc(prov)}</span>
                    <span class="country-count">${provSets.length} set${provSets.length !== 1 ? "s" : ""}</span>
                  </div>
                  <div class="gallery-grid province-group-grid">${provCards}</div>
                </div>`;
            }).join("");

            // Sets with no province go after all province boxes, no sub-box
            if (noProvince.length > 0) {
              const noProvCards = noProvince.map((set, i) => renderCardHTML(set, gi * 50 + 40 + i)).join("");
              innerHtml += `<div class="gallery-grid province-remainder-grid">${noProvCards}</div>`;
            }

          } else {
            // Flat grid for non-province countries
            innerHtml = `<div class="gallery-grid country-group-grid">${groupSets.map((set, i) => renderCardHTML(set, gi * 20 + i)).join("")}</div>`;
          }

          return `
            <div class="country-group" style="--cg-border:${border}; --cg-bg:${bg}; --cg-text:${text}">
              <div class="country-group-label">
                <span class="country-name">${esc(countryName)}</span>
                <span class="country-count">${groupSets.length} set${groupSets.length !== 1 ? "s" : ""}</span>
              </div>
              ${innerHtml}
            </div>`;
        }).join("");

      } else {
        // ── Flat view ──────────────────────────────────────────────────────
        groups.style.display = "none";
        groups.innerHTML = "";
        grid.style.display = "";
        grid.innerHTML = sets.map((set, i) => renderCardHTML(set, i)).join("");
      }
    }

    function normalise(s) { return String(s == null ? "" : s).toLowerCase().replace(/[^a-z0-9 ]/g, " "); }

    function filterAndSort() {
      const q = normalise(document.getElementById("search-input").value);
      const sort = document.getElementById("sort-select").value;

      let filtered = allSets.filter(set => {
        // Category filter
        if (activeCategory && !(set.categories || []).map(String).includes(String(activeCategory))) return false;
        // Text search
        if (!q) return true;
        const haystack = [set.setNo, set.name, set.year, set.country, set.province, set.city, set.giftedBy, set.description]
          .map(normalise).join(" ");
        return q.split(" ").filter(Boolean).every(word => haystack.includes(word));
      });

      filtered = sortSets(filtered, sort);
      renderGallery(filtered);
    }

    function sortSets(sets, sort) {
      return [...sets].sort((a, b) => {
        switch (sort) {
          case "newest": {
            const aHasYear = a.year != null && a.year !== 0;
            const bHasYear = b.year != null && b.year !== 0;
            // No-year sets always go to the end
            if (aHasYear && !bHasYear) return -1;
            if (!aHasYear && bHasYear) return 1;
            // Both have no year — sort by setNo desc
            if (!aHasYear && !bHasYear) return (b.setNo || 0) - (a.setNo || 0);
            // Both have year — sort year desc, then setNo desc
            if (b.year !== a.year) return b.year - a.year;
            return (b.setNo || 0) - (a.setNo || 0);
          }
          case "oldest": {
            const aHasYear = a.year != null && a.year !== 0;
            const bHasYear = b.year != null && b.year !== 0;
            // No-year sets always go to the end
            if (aHasYear && !bHasYear) return -1;
            if (!aHasYear && bHasYear) return 1;
            // Both have no year — sort by setNo asc
            if (!aHasYear && !bHasYear) return (a.setNo || 0) - (b.setNo || 0);
            // Both have year — sort year asc, then setNo asc
            if (a.year !== b.year) return a.year - b.year;
            return (a.setNo || 0) - (b.setNo || 0);
          }
          case "az":          return (a.name || "").localeCompare(b.name || "");
          case "za":          return (b.name || "").localeCompare(a.name || "");
          case "country-az":  return (a.country || "").localeCompare(b.country || "");
          case "country-za":  return (b.country || "").localeCompare(a.country || "");
          case "recently-added":
          default:            return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
        }
      });
    }

    window.clearFilters = function() {
      document.getElementById("search-input").value = "";
      document.getElementById("search-clear").style.display = "none";
      activeCategory = "";
      document.querySelectorAll(".cat-filter-btn").forEach(b => b.classList.remove("active"));
      const allBtn = document.querySelector(".cat-filter-btn[data-cat='']");
      if (allBtn) allBtn.classList.add("active");
      filterAndSort();
    };

    // Keep old clearSearch working too
    window.clearSearch = window.clearFilters;

    // Debounced search — waits 0.75s after last keystroke before filtering
    let searchDebounceTimer = null;
    document.getElementById("search-input").addEventListener("input", (e) => {
      document.getElementById("search-clear").style.display = e.target.value ? "block" : "none";
      clearTimeout(searchDebounceTimer);
      // If the field is cleared, filter immediately
      if (!e.target.value) {
        filterAndSort();
      } else {
        searchDebounceTimer = setTimeout(() => filterAndSort(), 750);
      }
    });
    document.getElementById("search-clear").addEventListener("click", () => window.clearFilters());
    document.getElementById("sort-select").addEventListener("change", filterAndSort);

    init();
  </script>
</body>
</html>
