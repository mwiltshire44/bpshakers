<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Salt & Pepper Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    /* Multi-select pill active state — uses existing cat-filter-btn styles, just tweaks active */
    .cat-filter-btn.active {
      background: var(--clay);
      color: #fff;
      border-color: var(--clay-dark);
    }
    /* Clear button for filter rows */
    .filter-clear-btn {
      flex-shrink: 0;
      display: none;
      align-items: center;
      padding: 5px 11px;
      font-family: 'Lora', serif;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1.5px solid rgba(184,92,56,0.4);
      border-radius: 99px;
      background: var(--cream);
      color: var(--clay-dark);
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      margin-left: 8px;
    }
    .filter-clear-btn.visible { display: inline-flex; }
    .filter-clear-btn:hover { background: rgba(184,92,56,0.08); border-color: var(--clay); }
    /* Profile filter bar — same structure as category bar */
    .profile-filter-bar {
      display: none;
      padding: 0 0 6px;
      border-bottom: 1px solid rgba(200,170,130,0.2);
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-title">
        <span class="header-eyebrow">A Family Collection</span>
        <h1 class="site-title">The Salt &amp; Pepper Shakers</h1>
        <span class="header-subtitle">Gathered with love, shared with joy</span>
      </div>
      <nav class="header-nav">
        <a href="index.html" class="nav-link active">Gallery</a>
        <a href="#" class="nav-link" id="admin-nav-link">Admin</a>
      </nav>
    </div>
  </header>

  <main class="main-content">

    <!-- Search & Sort Bar -->
    <div class="controls-bar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search by name, year, origin, occasion, description…" autocomplete="off" />
        <button class="search-clear" id="search-clear" aria-label="Clear search" style="display:none">✕</button>
      </div>
      <div class="sort-wrap">
        <label class="sort-label" for="sort-select">Sort by</label>
        <select id="sort-select" class="sort-select">
          <option value="set-number">Oldest first</option>
          <option value="set-number-desc">Newest first</option>
          <option value="recently-added">Recently added</option>
          <option value="az">Name A → Z</option>
          <option value="za">Name Z → A</option>
          <option value="country-az">By Country A → Z</option>
          <option value="country-za">By Country Z → A</option>
        </select>
      </div>
    </div>

    <!-- Category Filter Bar -->
    <div class="category-filter-bar" id="category-filter-bar" style="display:none">
      <span class="cat-filter-label">Category</span>
      <div class="cat-filter-pills-scroll">
        <div class="cat-filter-pills" id="cat-filter-pills"></div>
      </div>
      <button class="filter-clear-btn" id="cat-clear-btn" onclick="clearCategoryFilters()" title="Clear category filters">✕ Clear</button>
    </div>

    <!-- Profile Filter Bar -->
    <div class="profile-filter-bar" id="profile-filter-bar">
      <span class="cat-filter-label">Person</span>
      <div class="cat-filter-pills-scroll">
        <div class="cat-filter-pills" id="profile-filter-pills"></div>
      </div>
      <button class="filter-clear-btn" id="profile-clear-btn" onclick="clearProfileFilters()" title="Clear profile filters">✕ Clear</button>
    </div>

    <!-- Results count -->
    <div class="results-info" id="results-info"></div>

    <!-- Loading spinner -->
    <div class="gallery-loading" id="gallery-loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p>Loading the collection…</p>
    </div>

    <!-- Flat gallery grid (default) -->
    <div class="gallery-grid" id="gallery-grid"></div>

    <!-- Country-grouped view (country sorts only) -->
    <div id="country-groups" style="display:none"></div>

    <div class="gallery-empty" id="gallery-empty" style="display:none">
      <p id="empty-message">No shakers found.</p>
      <button class="btn-soft" onclick="clearFilters()">Clear filters</button>
    </div>

  </main>

  <footer class="site-footer">
    <p>A collection of treasures, lovingly catalogued &mdash; <span id="footer-year"></span></p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { firebaseConfig } from "./js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById("footer-year").textContent = new Date().getFullYear();

    onAuthStateChanged(auth, (user) => {
      const link = document.getElementById("admin-nav-link");
      if (user) {
        link.href = "admin/index.html";
        link.textContent = "Admin Panel";
      } else {
        link.href = "admin/login.html";
        link.textContent = "Admin";
      }
    });

    let allSets = [];
    let allCategories = [];
    let allProfiles = [];

    // ── Filter state ──────────────────────────────────────────────────────────
    let activeCategories = new Set(); // AND logic
    let activeProfiles   = new Set(); // OR logic

    // ── URL state helpers ─────────────────────────────────────────────────────
    function readStateFromURL() {
      const p = new URLSearchParams(window.location.search);
      return {
        q:       p.get("q")      || "",
        sort:    p.get("sort")   || "set-number",
        cats:    p.get("cats")   ? p.get("cats").split(",").filter(Boolean) : [],
        profs:   p.get("profs")  ? p.get("profs").split(",").filter(Boolean) : [],
        scroll:  p.get("scroll") ? parseInt(p.get("scroll")) : 0,
      };
    }

    function pushStateToURL() {
      const p = new URLSearchParams();
      const q = document.getElementById("search-input").value.trim();
      const sort = document.getElementById("sort-select").value;
      if (q)                          p.set("q",     q);
      if (sort !== "set-number")      p.set("sort",  sort);
      if (activeCategories.size > 0)  p.set("cats",  [...activeCategories].join(","));
      if (activeProfiles.size > 0)    p.set("profs", [...activeProfiles].join(","));
      // scroll is written by set-card click handler, not here
      const newURL = window.location.pathname + (p.toString() ? "?" + p.toString() : "");
      history.replaceState(null, "", newURL);
    }

    // Before navigating to a set page, stamp current scroll into URL
    function saveScrollToURL() {
      const p = new URLSearchParams(window.location.search);
      p.set("scroll", Math.round(window.scrollY));
      history.replaceState(null, "", window.location.pathname + "?" + p.toString());
    }

    // Build the complete gallery URL (all params + current scroll) in one pass
    // without relying on window.location.search being up to date
    function buildFullGalleryURL() {
      const p = new URLSearchParams();
      const q    = document.getElementById("search-input").value.trim();
      const sort = document.getElementById("sort-select").value;
      if (q)                         p.set("q",      q);
      if (sort !== "set-number")     p.set("sort",   sort);
      if (activeCategories.size > 0) p.set("cats",   [...activeCategories].join(","));
      if (activeProfiles.size > 0)   p.set("profs",  [...activeProfiles].join(","));
      p.set("scroll", Math.round(window.scrollY));
      return window.location.pathname + "?" + p.toString();
    }

    // ── Load data ─────────────────────────────────────────────────────────────
    async function init() {
      try {
        const [setsSnap, catsSnap, profsSnap] = await Promise.all([
          getDocs(query(collection(db, "sets"), orderBy("setNo"))),
          getDocs(query(collection(db, "categories"), orderBy("name"))),
          getDocs(query(collection(db, "profiles"), orderBy("name")))
        ]);

        allSets       = setsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        allCategories = catsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        allProfiles   = profsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Restore state from URL
        const state = readStateFromURL();
        document.getElementById("search-input").value = state.q;
        if (state.q) document.getElementById("search-clear").style.display = "block";
        document.getElementById("sort-select").value = state.sort;
        activeCategories = new Set(state.cats);
        activeProfiles   = new Set(state.profs);

        buildCategoryBar();
        buildProfileBar();
        filterAndSort();

        // Restore scroll position after render
        if (state.scroll > 0) {
          requestAnimationFrame(() => {
            setTimeout(() => window.scrollTo({ top: state.scroll, behavior: "instant" }), 80);
          });
        }
      } catch (e) {
        console.error("Error loading data:", e);
        document.getElementById("gallery-loading").innerHTML =
          '<p style="color:var(--clay)">Could not load the collection. Check your Firebase config.</p>';
      }
    }

    // ── Category bar ─────────────────────────────────────────────────────────
    function buildCategoryBar() {
      if (allCategories.length === 0) return;
      const bar = document.getElementById("category-filter-bar");
      const pills = document.getElementById("cat-filter-pills");
      bar.style.display = "flex";
      pills.innerHTML = "";
      allCategories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-filter-btn" + (activeCategories.has(cat.id) ? " active" : "");
        btn.dataset.cat = cat.id;
        btn.textContent = cat.name;
        btn.onclick = () => toggleCategory(cat.id);
        pills.appendChild(btn);
      });
      updateClearBtn("cat-clear-btn", activeCategories.size > 0);
    }

    function toggleCategory(catId) {
      if (activeCategories.has(catId)) {
        activeCategories.delete(catId);
      } else {
        activeCategories.add(catId);
      }
      // Update pill appearance
      document.querySelectorAll("#cat-filter-pills .cat-filter-btn").forEach(btn => {
        btn.classList.toggle("active", activeCategories.has(btn.dataset.cat));
      });
      updateClearBtn("cat-clear-btn", activeCategories.size > 0);
      filterAndSort();
    }

    window.clearCategoryFilters = function() {
      activeCategories.clear();
      document.querySelectorAll("#cat-filter-pills .cat-filter-btn").forEach(btn => btn.classList.remove("active"));
      updateClearBtn("cat-clear-btn", false);
      filterAndSort();
    };

    // ── Profile bar ───────────────────────────────────────────────────────────
    function buildProfileBar() {
      if (allProfiles.length === 0) return;

      // Only show profiles that are actually linked in at least one set
      const linkedProfileIds = new Set();
      const linkRegex = /\[([^\]]+)\]\(([^)]+)\)/g;
      allSets.forEach(set => {
        [set.giftedBy, set.description].forEach(field => {
          if (!field) return;
          let m;
          while ((m = linkRegex.exec(field)) !== null) {
            linkedProfileIds.add(m[2]);
          }
          linkRegex.lastIndex = 0;
        });
      });

      const visibleProfiles = allProfiles.filter(p => linkedProfileIds.has(p.id));
      if (visibleProfiles.length === 0) return;

      const bar = document.getElementById("profile-filter-bar");
      const pills = document.getElementById("profile-filter-pills");
      bar.style.display = "flex";
      pills.innerHTML = "";

      visibleProfiles.forEach(prof => {
        const btn = document.createElement("button");
        btn.className = "cat-filter-btn" + (activeProfiles.has(prof.id) ? " active" : "");
        btn.dataset.prof = prof.id;
        btn.textContent = prof.name;
        btn.onclick = () => toggleProfile(prof.id);
        pills.appendChild(btn);
      });
      updateClearBtn("profile-clear-btn", activeProfiles.size > 0);
    }

    function toggleProfile(profId) {
      if (activeProfiles.has(profId)) {
        activeProfiles.delete(profId);
      } else {
        activeProfiles.add(profId);
      }
      document.querySelectorAll("#profile-filter-pills .cat-filter-btn").forEach(btn => {
        btn.classList.toggle("active", activeProfiles.has(btn.dataset.prof));
      });
      updateClearBtn("profile-clear-btn", activeProfiles.size > 0);
      filterAndSort();
    }

    window.clearProfileFilters = function() {
      activeProfiles.clear();
      document.querySelectorAll("#profile-filter-pills .cat-filter-btn").forEach(btn => btn.classList.remove("active"));
      updateClearBtn("profile-clear-btn", false);
      filterAndSort();
    };

    function updateClearBtn(btnId, visible) {
      const btn = document.getElementById(btnId);
      if (btn) btn.classList.toggle("visible", visible);
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    function esc(str) {
      if (!str) return "";
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function setHasProfile(set, profId) {
      const linkRegex = /\[([^\]]+)\]\(([^)]+)\)/g;
      for (const field of [set.giftedBy, set.description]) {
        if (!field) continue;
        let m;
        while ((m = linkRegex.exec(field)) !== null) {
          if (m[2] === profId) { linkRegex.lastIndex = 0; return true; }
        }
        linkRegex.lastIndex = 0;
      }
      return false;
    }

    // ── Country color map ─────────────────────────────────────────────────────
    const COUNTRY_COLORS = {
      "Canada":         ["#c41e3a", "#f9f4ec", "#8b0000"],
      "USA":            ["#3c3b6e", "#f9f4ec", "#1a1940"],
      "United States":  ["#3c3b6e", "#f9f4ec", "#1a1940"],
      "Unknown":        ["#b85c38", "#f9f4ec", "#7a3e28"],
      "Japan":          ["#bc002d", "#f9f4ec", "#7a0020"],
      "Germany":        ["#2b2b2b", "#f9f4ec", "#1a1a1a"],
      "France":         ["#0055a4", "#f9f4ec", "#003380"],
      "Italy":          ["#009246", "#f9f4ec", "#006630"],
      "Spain":          ["#c60b1e", "#f9f4ec", "#8a0015"],
      "Mexico":         ["#006847", "#f9f4ec", "#004d35"],

      "Switzerland":    ["#ff0000", "#f9f4ec", "#cc0000"],
      "Austria":        ["#ed2939", "#f9f4ec", "#b01d2a"],
      "Poland":         ["#dc143c", "#f9f4ec", "#9a0e2a"],
      "Czech Republic": ["#d7141a", "#f9f4ec", "#960e12"],
      "Hungary":        ["#477050", "#f9f4ec", "#2d4d33"],
      "Romania":        ["#002b7f", "#f9f4ec", "#001a4d"],
      "Greece":         ["#0d5eaf", "#f9f4ec", "#083d80"],
      "China":          ["#de2910", "#f9f4ec", "#9e1c0b"],
      "India":          ["#ff9933", "#f9f4ec", "#cc7a00"],
      "Australia":      ["#00008b", "#f9f4ec", "#000066"],

      "Morocco":        ["#c1272d", "#f9f4ec", "#891d21"],
      "Taiwan":         ["#fe0000", "#f9f4ec", "#cc0000"],
      "South Korea":    ["#003478", "#f9f4ec", "#002050"],
      "Thailand":       ["#a51931", "#f9f4ec", "#731222"],
      "Vietnam":        ["#da251d", "#f9f4ec", "#9a1a14"],
      "Philippines":    ["#0038a8", "#f9f4ec", "#002880"],
      "Indonesia":      ["#ce1126", "#f9f4ec", "#920c1b"],
      "Malaysia":       ["#cc0001", "#f9f4ec", "#8a0001"],
      "Singapore":      ["#ef3340", "#f9f4ec", "#b0232e"],
      "Russia":         ["#003580", "#f9f4ec", "#002060"],
      "Ukraine":        ["#005bbb", "#f9f4ec", "#003d80"],
      "Turkey":         ["#e30a17", "#f9f4ec", "#a00711"],
      "Israel":         ["#0038b8", "#f9f4ec", "#002880"],
      "Saudi Arabia":   ["#006c35", "#f9f4ec", "#004a24"],
      "Cuba":           ["#002a8f", "#f9f4ec", "#001a60"],
      "Jamaica":        ["#2d7a2d", "#f9f4ec", "#1a5a1a"],
    };
    const DEFAULT_COLORS = ["#7a4f2e", "#f7f0e8", "#4a2e10"];
    function getCountryColors(country) {
      if (!country || country.trim() === "") return COUNTRY_COLORS["Unknown"] || DEFAULT_COLORS;
      return COUNTRY_COLORS[country] || DEFAULT_COLORS;
    }

    // ── Card HTML ─────────────────────────────────────────────────────────────
    function renderCardHTML(set, i) {
      return `
        <a href="set.html?id=${esc(set.id)}" class="gallery-card" style="animation-delay:${Math.min(i * 40, 400)}ms" data-set-id="${esc(set.id)}" data-gallery-link="1">
          <div class="card-image-wrap">
            <img
              src="${esc(set.imageUrl || "")}"
              alt="${esc(set.name)}"
              class="card-image"
              loading="lazy"
              onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 90%22%3E%3Crect width=%22120%22 height=%2290%22 fill=%22%23f0e8d8%22/%3E%3Ctext x=%2260%22 y=%2240%22 text-anchor=%22middle%22 font-size=%2220%22 fill=%22%23c4843a%22 opacity=%220.5%22%3E%F0%9F%A7%82%3C/text%3E%3Ctext x=%2260%22 y=%2265%22 text-anchor=%22middle%22 font-family=%22Georgia%2C serif%22 font-size=%228%22 fill=%22%23a07a58%22 font-style=%22italic%22%3ENo image yet%3C/text%3E%3C/svg%3E'"
            />
            <div class="card-overlay">
              <span class="card-name">${esc(set.name)}</span>
              <span class="card-country">${set.setNo != null ? `#${set.setNo}` : ""}${set.setNo != null && set.country ? " · " : ""}${esc(set.country || "")}</span>
            </div>
          </div>
        </a>`;
    }

    // ── Render gallery ────────────────────────────────────────────────────────
    function renderGallery(sets) {
      const grid      = document.getElementById("gallery-grid");
      const groups    = document.getElementById("country-groups");
      const loading   = document.getElementById("gallery-loading");
      const empty     = document.getElementById("gallery-empty");
      const info      = document.getElementById("results-info");
      const sort      = document.getElementById("sort-select").value;
      const isCountry = sort === "country-az" || sort === "country-za";

      if (loading) loading.style.display = "none";

      if (sets.length === 0) {
        grid.innerHTML = ""; groups.innerHTML = "";
        grid.style.display = ""; groups.style.display = "none";
        empty.style.display = "block"; info.textContent = "";
        const q = document.getElementById("search-input").value.trim();
        let msg = "No shakers found";
        if (q) msg += ` matching "${q}"`;
        if (activeCategories.size > 0) msg += " with the selected categories";
        if (activeProfiles.size > 0) msg += " linked to the selected people";
        document.getElementById("empty-message").textContent = msg + ".";
        return;
      }

      empty.style.display = "none";

      const q = document.getElementById("search-input").value.trim();
      let infoText = `${sets.length} set${sets.length !== 1 ? "s" : ""}`;
      if (activeCategories.size > 0) infoText += ` · ${activeCategories.size} categor${activeCategories.size === 1 ? "y" : "ies"}`;
      if (activeProfiles.size > 0)   infoText += ` · ${activeProfiles.size} person${activeProfiles.size === 1 ? "" : "s"}`;
      if (q) infoText += ` matching "${q}"`;
      info.textContent = infoText;

      if (isCountry) {
        grid.style.display = "none"; grid.innerHTML = "";
        groups.style.display = "block";
        const PROVINCE_COUNTRIES = ["Canada", "USA"];
        const grouped = {};
        sets.forEach(set => {
          const key = set.country && set.country.trim() ? set.country.trim() : "__unknown__";
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(set);
        });
        let keys = Object.keys(grouped).filter(k => k !== "__unknown__");
        keys.sort((a, b) => sort === "country-za" ? b.localeCompare(a) : a.localeCompare(b));
        if (grouped["__unknown__"]) keys.push("__unknown__");

        groups.innerHTML = keys.map((key, gi) => {
          const countryName = key === "__unknown__" ? "Unknown" : key;
          const [border, bg, text] = getCountryColors(countryName);
          const groupSets = grouped[key];
          const useProvinces = PROVINCE_COUNTRIES.includes(countryName);
          let innerHtml = "";
          if (useProvinces) {
            const byProvince = {}; const noProvince = [];
            groupSets.forEach(set => {
              const prov = set.province && set.province.trim() ? set.province.trim() : null;
              if (prov) { if (!byProvince[prov]) byProvince[prov] = []; byProvince[prov].push(set); }
              else noProvince.push(set);
            });
            let provKeys = Object.keys(byProvince);
            provKeys.sort((a, b) => sort === "country-za" ? b.localeCompare(a) : a.localeCompare(b));
            innerHtml += provKeys.map((prov, pi) => {
              const provSets = byProvince[prov];
              return `<div class="province-group">
                <div class="province-group-label">
                  <span class="province-name">${esc(prov)}</span>
                  <span class="country-count">${provSets.length} set${provSets.length !== 1 ? "s" : ""}</span>
                </div>
                <div class="gallery-grid province-group-grid">${provSets.map((s, i) => renderCardHTML(s, gi*50+pi*20+i)).join("")}</div>
              </div>`;
            }).join("");
            if (noProvince.length > 0) {
              innerHtml += `<div class="gallery-grid province-remainder-grid">${noProvince.map((s, i) => renderCardHTML(s, gi*50+40+i)).join("")}</div>`;
            }
          } else {
            innerHtml = `<div class="gallery-grid country-group-grid">${groupSets.map((s, i) => renderCardHTML(s, gi*20+i)).join("")}</div>`;
          }
          return `<div class="country-group" style="--cg-border:${border}; --cg-bg:${bg}; --cg-text:${text}">
            <div class="country-group-label">
              <span class="country-name">${esc(countryName)}</span>
              <span class="country-count">${groupSets.length} set${groupSets.length !== 1 ? "s" : ""}</span>
            </div>
            ${innerHtml}
          </div>`;
        }).join("");
      } else {
        groups.style.display = "none"; groups.innerHTML = "";
        grid.style.display = "";
        grid.innerHTML = sets.map((set, i) => renderCardHTML(set, i)).join("");
      }

      // Stamp gallery URL into card href at pointer/touch down so native
      // navigation carries the right URL — avoids mobile tap reliability issues
      // caused by preventDefault() in click handlers.
      document.querySelectorAll(".gallery-card[data-gallery-link]").forEach(card => {
        function stampHref() {
          const fullUrl = buildFullGalleryURL();
          // Also keep window.location in sync for browser back button
          history.replaceState(null, "", fullUrl);
          card.href = `set.html?id=${card.dataset.setId}&gallery=${encodeURIComponent(fullUrl)}`;
        }
        card.addEventListener("mousedown",   stampHref, { passive: true });
        card.addEventListener("touchstart",  stampHref, { passive: true });
      });
    }

    // ── Filter & sort ─────────────────────────────────────────────────────────
    function normalise(s) { return String(s == null ? "" : s).toLowerCase().replace(/[^a-z0-9 ]/g, " "); }

    function filterAndSort() {
      const q    = normalise(document.getElementById("search-input").value);
      const sort = document.getElementById("sort-select").value;

      let filtered = allSets.filter(set => {
        // Category filter (AND — must have all selected)
        if (activeCategories.size > 0) {
          const setCats = (set.categories || []).map(String);
          for (const catId of activeCategories) {
            if (!setCats.includes(String(catId))) return false;
          }
        }
        // Profile filter (OR — must have at least one selected)
        if (activeProfiles.size > 0) {
          const matchesAny = [...activeProfiles].some(profId => setHasProfile(set, profId));
          if (!matchesAny) return false;
        }
        // Text search
        if (!q) return true;
        const haystack = [set.setNo, set.name, set.year, set.country, set.province,
                          set.city, set.giftedBy, set.occasion, set.description]
          .map(normalise).join(" ");
        return q.split(" ").filter(Boolean).every(word => haystack.includes(word));
      });

      filtered = sortSets(filtered, sort);
      pushStateToURL();
      renderGallery(filtered);
    }

    function sortSets(sets, sort) {
      return [...sets].sort((a, b) => {
        switch (sort) {
          case "set-number":
            return (a.setNo || 0) - (b.setNo || 0);
          case "set-number-desc": return (b.setNo || 0) - (a.setNo || 0);
          case "az":         return (a.name || "").localeCompare(b.name || "");
          case "za":         return (b.name || "").localeCompare(a.name || "");
          case "country-az": return (a.country || "").localeCompare(b.country || "");
          case "country-za": return (b.country || "").localeCompare(a.country || "");
          case "recently-added":
          default:           return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
        }
      });
    }

    // ── Global clear ─────────────────────────────────────────────────────────
    window.clearFilters = function() {
      document.getElementById("search-input").value = "";
      document.getElementById("search-clear").style.display = "none";
      window.clearCategoryFilters();
      window.clearProfileFilters();
    };
    window.clearSearch = window.clearFilters;

    // ── Event listeners ───────────────────────────────────────────────────────
    let searchDebounceTimer = null;
    document.getElementById("search-input").addEventListener("input", (e) => {
      document.getElementById("search-clear").style.display = e.target.value ? "block" : "none";
      clearTimeout(searchDebounceTimer);
      if (!e.target.value) { filterAndSort(); }
      else { searchDebounceTimer = setTimeout(() => filterAndSort(), 750); }
    });
    document.getElementById("search-clear").addEventListener("click", () => window.clearFilters());
    document.getElementById("sort-select").addEventListener("change", filterAndSort);

    init();
  </script>
</body>
</html>
