<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — The Salt & Pepper Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="login-page">

  <main class="login-main">
    <div class="login-card">
      <a href="../index.html" class="login-back">← Back to Gallery</a>
      <div class="login-header">
        <div class="login-icon">🧂</div>
        <h1 class="login-title">Admin Sign In</h1>
        <p class="login-sub">The Salt &amp; Pepper Collection</p>
      </div>

      <div class="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="form-error" id="login-error" style="display:none"></div>
        <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { firebaseConfig } from "../js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "index.html";
    });

    window.doLogin = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("login-btn");
      const err = document.getElementById("login-error");

      err.style.display = "none";
      btn.textContent = "Signing in…";
      btn.disabled = true;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
      } catch (e) {
        err.textContent = "Invalid email or password. Please try again.";
        err.style.display = "block";
        btn.textContent = "Sign In";
        btn.disabled = false;
      }
    };

    // Enter key support
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") window.doLogin();
    });
  </script>
</body>
</html>
